<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="やまねこ亭">

<title>バイオームの魔法使い (後編) 国語クイズ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: 'DotGothic16', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: #5a3a1a;
    color: #3b2a14;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* === SKY + GROUND === */
  .scene {
    background: linear-gradient(180deg, #2d1b4e 0%, #5d3d8a 25%, #c878a8 45%, #ffb074 58%, #5d8c3e 60%, #4a7a2e 100%);
    height: 200px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    border-bottom: 4px solid #3d5c1e;
  }
  .scene .clouds {
    position: absolute; top: 15px; width: 100%;
  }
  .cloud {
    position: absolute;
    background: #fff;
    border-radius: 2px;
    opacity: 0.85;
  }
  .cloud1 { width:40px; height:12px; top:10px; left:15%; }
  .cloud1::after { content:''; position:absolute; background:#fff; width:24px; height:10px; top:-7px; left:8px; border-radius:2px; }
  .cloud2 { width:50px; height:14px; top:25px; left:60%; }
  .cloud2::after { content:''; position:absolute; background:#fff; width:30px; height:10px; top:-7px; left:10px; border-radius:2px; }
  .cloud3 { width:35px; height:10px; top:5px; left:40%; }


  .star {
    position: absolute;
    color: #fff;
    font-size: 12px;
    text-shadow: 0 0 6px #fff, 0 0 10px #c878a8;
    animation: twinkle 2.5s ease-in-out infinite;
  }
  .star.s1 { top: 10px; left: 10%; animation-delay: 0s; }
  .star.s2 { top: 25px; left: 28%; animation-delay: 0.6s; font-size: 9px; }
  .star.s3 { top: 8px; left: 50%; animation-delay: 1.2s; font-size: 14px; }
  .star.s4 { top: 30px; left: 72%; animation-delay: 0.3s; }
  .star.s5 { top: 18px; left: 88%; animation-delay: 1.5s; font-size: 10px; }
  .moon {
    position: absolute;
    top: 12px;
    right: 18%;
    width: 22px;
    height: 22px;
    background: radial-gradient(circle at 35% 35%, #fff8d4 0%, #f0d878 60%, #d4a838 100%);
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(255, 240, 180, 0.8);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.4; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }
  /* === PIXEL CHARACTERS === */
  .characters {
    position: absolute;
    bottom: 18px;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 20px;
  }
  .char-container { position: relative; }
  .char-name {
    text-align: center;
    font-size: 11px;
    color: #fff;
    text-shadow: 1px 1px 0 #333, -1px -1px 0 #333, 1px -1px 0 #333, -1px 1px 0 #333;
    margin-bottom: 2px;
    letter-spacing: 1px;
  }
  canvas.char-sprite { image-rendering: pixelated; display: block; margin: 0 auto; }

  /* grass blocks */
  .grass-row {
    position: absolute; bottom: 0; width: 100%; height: 18px;
    display: flex;
  }
  .grass-block {
    flex: 1;
    background: linear-gradient(180deg, #5d8c3e 0%, #5d8c3e 35%, #8B6914 35%, #7a5c12 100%);
    border-right: 1px solid #4a7a2e;
  }

  /* === MAIN CONTENT === */
  .content {
    flex: 1;
    background: #f5e6c8;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 31px, #e8d5a3 31px, #e8d5a3 32px),
      repeating-linear-gradient(90deg, transparent, transparent 31px, #e8d5a3 31px, #e8d5a3 32px);
    padding: 16px;
    position: relative;
  }
  .content::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 8px;
    background: repeating-linear-gradient(90deg, #8B6914 0px, #8B6914 15px, #7a5c12 15px, #7a5c12 16px, #8B6914 16px, #8B6914 32px);
  }

  /* === TITLE SCREEN === */
  .title-screen {
    text-align: center;
    padding-top: 10px;
  }
  .title-screen h1 {
    font-size: 26px;
    color: #3b2a14;
    text-shadow: 2px 2px 0 #d4b896;
    margin-bottom: 8px;
    letter-spacing: 3px;
  }
  .title-screen .subtitle {
    font-size: 14px;
    color: #6b5a3a;
    margin-bottom: 20px;
  }

  /* === BUTTONS === */
  .mc-btn {
    display: block;
    width: 100%;
    max-width: 300px;
    margin: 10px auto;
    padding: 14px 20px;
    font-family: 'DotGothic16', sans-serif;
    font-size: 17px;
    color: #fff;
    background: linear-gradient(180deg, #6aaa3a 0%, #4a8a2a 50%, #3d7a1e 100%);
    border: 3px solid #2d5a0e;
    border-radius: 4px;
    box-shadow: inset 0 -3px 0 #2d5a0e, inset 0 3px 0 #7ec050;
    cursor: pointer;
    text-shadow: 1px 1px 0 #2d5a0e;
    letter-spacing: 2px;
    -webkit-appearance: none;
  }
  .mc-btn:active {
    transform: translateY(2px);
    box-shadow: inset 0 -1px 0 #2d5a0e, inset 0 3px 0 #7ec050;
  }
  .mc-btn.gray {
    background: linear-gradient(180deg, #8a8a8a 0%, #6a6a6a 50%, #555 100%);
    border-color: #444;
    box-shadow: inset 0 -3px 0 #444, inset 0 3px 0 #aaa;
    text-shadow: 1px 1px 0 #333;
  }
  .reread-btn {
    margin-top: 16px;
    background: linear-gradient(180deg, #c9a84c 0%, #a88832 50%, #8a6e20 100%);
    border-color: #6b5518;
    box-shadow: inset 0 -3px 0 #6b5518, inset 0 3px 0 #e0c060;
    font-size: 13px;
    padding: 8px 16px;
  }

  /* === STORY TEXT === */
  .story-header {
    text-align: center;
    font-size: 14px;
    color: #6b5a3a;
    margin-bottom: 6px;
    padding-bottom: 6px;
    border-bottom: 2px dashed #cdb98a;
  }
  /* スマホでは左カラムの本文を非表示（もういちど読むで読む） */
  .quiz-landscape .ql-story { display: none; }
  .quiz-landscape .ql-right { flex: 1; }
  .quiz-landscape { display: block; }
  .story-text {
    font-size: 20px;
    line-height: 1.85;
    color: #3b2a14;
    padding: 10px 12px;
    background: rgba(255,255,255,0.5);
    border: 2px solid #cdb98a;
    border-radius: 4px;
    margin-bottom: 8px;
    max-height: 50vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* === ふりがなポップアップ === */
  .kanji-pop {
    color: inherit;
    /* border-bottom: 2px dotted #5d8c3e; (下線なし) */
    cursor: pointer;
    position: relative;
    padding: 0 1px;
  }
  .kanji-pop.active {
    background: #fff3d0;
    border-radius: 3px;
  }
  .kanji-pop.active::after {
    content: attr(data-yomi);
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #3b2a14;
    color: #fff;
    padding: 5px 12px;
    font-size: 15px;
    border-radius: 4px;
    white-space: nowrap;
    z-index: 100;
    margin-bottom: 6px;
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    font-weight: normal;
  }
  .kanji-pop.active::before {
    content: '';
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-top: 7px solid #3b2a14;
    z-index: 100;
  }

  /* === QUIZ === */
  .quiz-header {
    font-size: 15px;
    color: #8B6914;
    margin-bottom: 6px;
  }
  .quiz-question {
    font-size: 15px;
    line-height: 1.6;
    color: #3b2a14;
    padding: 8px 10px;
    background: rgba(255,255,255,0.5);
    border: 2px solid #cdb98a;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .choice-btn {
    display: block;
    width: 100%;
    padding: 10px 14px;
    margin-bottom: 6px;
    font-family: 'DotGothic16', sans-serif;
    font-size: 15px;
    color: #3b2a14;
    background: linear-gradient(180deg, #f5e6c8, #e8d5a3);
    border: 2px solid #b89a6a;
    border-radius: 4px;
    cursor: pointer;
    text-align: left;
    -webkit-appearance: none;
    line-height: 1.5;
  }
  .choice-btn:active { background: #e0cda0; }
  .choice-btn.correct {
    background: linear-gradient(180deg, #a8e6a0, #7dcc70) !important;
    border-color: #4a9a3a !important;
    color: #1a4a10 !important;
  }
  .choice-btn.wrong {
    background: linear-gradient(180deg, #e6a0a0, #cc7070) !important;
    border-color: #9a3a3a !important;
    color: #4a1010 !important;
  }
  .choice-btn:disabled { opacity: 0.85; }

  /* === RESULT FEEDBACK === */
  .result-box {
    padding: 8px 10px;
    border-radius: 4px;
    margin: 6px 0;
    font-size: 13px;
    line-height: 1.5;
  }
  .result-box.correct {
    background: #d4f5d0;
    border: 2px solid #6abf5a;
    color: #2a6a1a;
  }
  .result-box.wrong {
    background: #f5d0d0;
    border: 2px solid #bf5a5a;
    color: #6a1a1a;
  }

  /* === PROGRESS BAR === */
  .progress-bar {
    width: 100%;
    height: 8px;
    background: #cdb98a;
    border-radius: 4px;
    margin-bottom: 6px;
    overflow: hidden;
    border: 1px solid #b89a6a;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #6aaa3a, #4a8a2a);
    border-radius: 5px;
    transition: width 0.4s ease;
  }

  /* === SCORE === */
  .score-display {
    text-align: center;
    font-size: 13px;
    color: #6b5a3a;
    margin-bottom: 4px;
  }
  .score-display .num { color: #4a8a2a; font-size: 18px; }

  /* === FINAL SCREEN === */
  .final-score {
    text-align: center;
    padding: 20px 0;
  }
  .final-score h2 {
    font-size: 22px;
    color: #3b2a14;
    margin-bottom: 16px;
  }
  .final-score .big-score {
    font-size: 48px;
    color: #4a8a2a;
    margin: 10px 0;
  }
  .final-score .big-score span { font-size: 20px; color: #6b5a3a; }
  .stars { font-size: 36px; margin: 10px 0; }

  /* === BOUNCE ANIM === */
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .bounce { animation: bounce 0.5s ease; }

  /* speech bubble */
  .speech {
    position: absolute;
    background: #fff;
    border: 2px solid #3b2a14;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 11px;
    color: #3b2a14;
    white-space: nowrap;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-bottom: 6px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .speech.show { opacity: 1; }
  .speech::after {
    content: '';
    position: absolute;
    bottom: -7px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 7px solid #3b2a14;
  }

  /* === 過去に間違えた選択肢 === */
  .choice-btn.past-wrong {
    background: linear-gradient(180deg, #d8cbb5, #c0b092) !important;
    color: #999 !important;
    border-color: #a89878 !important;
    text-decoration: line-through;
    opacity: 0.7;
  }

  /* === ログ表示 === */
  .log-summary-box {
    background: rgba(255,255,255,0.7);
    border: 2px solid #cdb98a;
    border-radius: 4px;
    padding: 12px 14px;
    margin: 14px auto;
    max-width: 360px;
    text-align: left;
    font-size: 14px;
    color: #3b2a14;
  }
  .log-summary-box h3 { font-size: 16px; margin-bottom: 8px; color: #6b5a3a; }
  .log-summary-box .log-row { margin: 4px 0; line-height: 1.7; }
  .log-details {
    max-width: 420px;
    margin: 10px auto;
    text-align: left;
    font-size: 13px;
    background: rgba(255,255,255,0.5);
    border: 1px solid #cdb98a;
    border-radius: 4px;
    padding: 6px 12px;
    color: #3b2a14;
  }
  .log-details summary {
    cursor: pointer;
    padding: 6px 0;
    font-weight: bold;
    color: #6b5a3a;
    font-size: 14px;
  }
  .log-section {
    padding: 8px 0;
    border-bottom: 1px dashed #cdb98a;
  }
  .log-section:last-child { border-bottom: none; }
  .log-title {
    font-weight: bold;
    color: #8B6914;
    margin-bottom: 4px;
    font-size: 13px;
  }
  .log-section .log-row {
    font-size: 12px;
    color: #6b5a3a;
    margin: 2px 0;
  }
  .log-wrong-item {
    background: #f5d0d0;
    padding: 5px 7px;
    border-radius: 3px;
    margin: 4px 0;
    font-size: 12px;
    line-height: 1.5;
  }
  .log-q { color: #6a1a1a; font-weight: bold; }
  .log-a { color: #9a3a3a; margin-top: 2px; }
  .log-ok-item {
    color: #2a6a1a;
    font-size: 12px;
    margin: 4px 0;
  }

  /* === iPad 横向き (幅768px以上) === */
  @media (min-width: 768px) {
    #app {
      max-width: 100%;
      flex-direction: row;
      flex-wrap: wrap;
      height: 100vh;
      min-height: 100vh;
      overflow: hidden;
    }
    .scene {
      width: 100%;
      height: 120px;
      flex-shrink: 0;
    }
    .characters { gap: 30px; }
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 10px 24px;
    }
    /* 2カラム: 本文(左) + クイズ(右) */
    .quiz-landscape {
      display: flex !important;
      gap: 16px;
      align-items: flex-start;
    }
    .quiz-landscape .ql-story {
      display: block !important;
      flex: 1;
      min-width: 0;
      max-height: calc(100vh - 200px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      font-size: 14px;
      line-height: 1.75;
      padding: 8px 10px;
      background: rgba(255,255,255,0.5);
      border: 2px solid #cdb98a;
      border-radius: 4px;
    }
    .quiz-landscape .ql-right {
      flex: 1;
      min-width: 0;
    }
    /* 横向きクイズ画面では「もういちど読む」不要（左に常時表示） */
    .quiz-landscape .reread-btn { display: none; }
    .story-text {
      max-height: calc(100vh - 260px);
    }
    .mc-btn {
      padding: 10px 20px;
      font-size: 15px;
    }
    .choice-btn {
      padding: 10px 14px;
      font-size: 14px;
    }
    .title-screen h1 { font-size: 30px; }
    .final-score .big-score { font-size: 42px; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- Scene with characters -->
  <div class="scene">
    <div class="clouds">
      <div class="moon"></div>
      <div class="star s1">✦</div>
      <div class="star s2">✧</div>
      <div class="star s3">✦</div>
      <div class="star s4">✧</div>
      <div class="star s5">✦</div>
    </div>
    <div class="characters" id="characters"></div>
    <div class="grass-row" id="grassRow"></div>
  </div>

  <!-- Content area -->
  <div class="content" id="content"></div>
</div>

const FURIGANA_KEYS = Object.keys(FURIGANA_DICT).sort((a, b) => b.length - a.length);

function applyFurigana(text) {
  // text中の辞書単語をspanで置き換える。タグは壊さない想定（<br>を含む可能性あり）
  // <br> タグを一時マーカーに置換してから処理
  const BR_MARK = "\u0001BR\u0001";
  let t = text.replace(/<br>/g, BR_MARK);
  let result = "";
  let i = 0;
  while (i < t.length) {
    // マーカーを先にチェック
    if (t.startsWith(BR_MARK, i)) { result += "<br>"; i += BR_MARK.length; continue; }
    let matched = false;
    for (const key of FURIGANA_KEYS) {
      if (t.startsWith(key, i)) {
        const yomi = FURIGANA_DICT[key];
        result += `<span class="kanji-pop" data-yomi="${yomi}">${key}</span>`;
        i += key.length;
        matched = true;
        break;
      }
    }
    if (!matched) {
      // HTML エスケープは必要最小限（< > & のみ）
      const ch = t[i];
      result += ch === "<" ? "&lt;" : ch === ">" ? "&gt;" : ch === "&" ? "&amp;" : ch;
      i++;
    }
  }
  return result;
}

function drawSprite(canvasId, spriteName, scale) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const sprite = SPRITES[spriteName];
  const s = scale || 3;
  canvas.width = sprite.width * s;
  canvas.height = sprite.height * s;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  sprite.pixels.forEach((row, y) => {
    for (let x = 0; x < row.length; x++) {
      const c = row[x];
      if (c !== '.' && sprite.colors[c]) {
        ctx.fillStyle = sprite.colors[c];
        ctx.fillRect(x * s, y * s, s, s);
      }
    }
  });
}

function showSpeech(charId, text, duration) {
  const el = document.getElementById('speech' + charId);
  if (!el) return;
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration || 2500);
}

// ===== SAVE / LOAD =====
const SAVE_KEY = 'wizard_part2_save';
const LOG_KEY = 'wizard_part2_save_log';
let storageOK = false;
try { localStorage.setItem('_test','1'); localStorage.removeItem('_test'); storageOK = true; } catch(e) {}

function flushReadingTimer() {
  if (readingStartTime === null) return;
  const now = Date.now();
  const elapsed = Math.floor((now - readingStartTime) / 1000);
  if (log.sections[currentSection]) {
    log.sections[currentSection].readingSeconds += elapsed;
  }
  readingStartTime = now;
}

function saveProgress() {
  if (!storageOK) return;
  if (phase === 'reading') flushReadingTimer();
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      section: currentSection, question: currentQuestion,
      score: score, phase: phase,
      answers: answers, log: log, v: 3
    }));
  } catch(e) {}
}
function loadProgress() {
  if (!storageOK) return null;
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (d && d.v === 3 && d.section < sections.length) return d;
  } catch(e) {}
  return null;
}
function clearProgress() {
  if (!storageOK) return;
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}
function saveLogArchive() {
  if (!storageOK) return;
  try { localStorage.setItem(LOG_KEY, JSON.stringify(log)); } catch(e) {}
}

// ===== GAME STATE =====
let currentSection = 0;
let currentQuestion = 0;
let score = 0; // 1回で正解した問題数
let totalQuestions = sections.reduce((sum, s) => sum + s.questions.length, 0);
let phase = 'title';

// answers[sec][q] = { wrongChoices: [2,1], locked: false }
function makeFreshAnswers() {
  return sections.map(s => s.questions.map(() => ({ wrongChoices: [], locked: false })));
}
let answers = makeFreshAnswers();

// ===== LOG =====
function makeFreshLog() {
  return {
    startedAt: new Date().toISOString(),
    completedAt: null,
    sections: sections.map(s => ({
      title: s.title,
      readingSeconds: 0,
      rereadCount: 0,
      questions: s.questions.map(q => ({
        q: q.q,
        wrongChoicesTexts: [],
        attemptCount: 0,
        firstTryCorrect: false
      }))
    }))
  };
}
let log = makeFreshLog();

// 読書タイマー
let readingStartTime = null;
function startReadingTimer() { readingStartTime = Date.now(); }
function stopReadingTimer() {
  if (readingStartTime === null) return;
  const elapsed = Math.floor((Date.now() - readingStartTime) / 1000);
  if (log.sections[currentSection]) {
    log.sections[currentSection].readingSeconds += elapsed;
  }
  readingStartTime = null;
}

// 10秒ごとに読書中の時間をセーブ（中断対策）
setInterval(() => {
  if (phase === 'reading') saveProgress();
}, 10000);

// ページを離れるときもセーブ
window.addEventListener('beforeunload', () => {
  if (phase !== 'title' && phase !== 'final') saveProgress();
});
document.addEventListener('visibilitychange', () => {
  if (document.hidden && phase !== 'title' && phase !== 'final') saveProgress();
});

// ===== RENDER =====
function render() {
  const content = document.getElementById('content');
  switch (phase) {
    case 'title': renderTitle(content); break;
    case 'reading': renderReading(content); break;
    case 'quiz': renderQuiz(content); break;
    case 'final': renderFinal(content); break;
  }
}

function renderTitle(el) {
  const saved = loadProgress();
  const resumeBtn = saved && saved.phase !== 'title' && saved.phase !== 'final'
    ? `<button class="mc-btn" onclick="resumeGame()" style="margin-bottom:10px">つづきから（${sections[saved.section].title}）</button>`
    : '';
  el.innerHTML = `
    <div class="title-screen">
      <h1>✨ バイオームの魔法使い (後編)</h1>
      <div class="subtitle">〜 国語クイズ 〜</div>
      <p style="font-size:13px; color:#6b5a3a; margin-bottom:6px;">
        「バイオームの魔法使い」を読んで<br>クイズに答えよう！
      </p>
      <p style="font-size:12px; color:#8a7a5a; margin-bottom:12px;">
        第五章 〜 エピローグ<br>
        全${sections.length}パート・${totalQuestions}問
      </p>
      <p style="font-size:11px; color:#8a7a5a; margin-bottom:16px; line-height:1.7;">
        ★ クイズ中は本文は見られないよ<br>
        ★ まちがえたら、もう一度読みなおし！<br>
        ★ 正解するまで次へは進めません
      </p>
      ${resumeBtn}
      <button class="mc-btn ${resumeBtn ? 'gray' : ''}" onclick="startGame()">はじめから</button>
    </div>
  `;
  setTimeout(() => showSpeech('Yuuki', 'がんばろう！', 2500), 500);
  setTimeout(() => showSpeech('Kent', 'ちゃんと読んでね', 2500), 1200);
}

function renderReading(el) {
  const sec = sections[currentSection];
  const progress = currentSection / sections.length * 100;
  const qIdx = currentQuestion;
  const ans = answers[currentSection][qIdx];
  const isRetry = ans && ans.wrongChoices.length > 0;
  const hint = isRetry
    ? '<div style="background:#fff3d0; border:2px solid #e0b020; padding:8px 10px; border-radius:4px; font-size:13px; color:#8a5a10; margin-bottom:8px;">🔍 もう一度じっくり読んで、答えをさがしてみよう！</div>'
    : '';
  el.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="score-display">1回で正解: <span class="num">${score}</span> / ${totalQuestions}</div>
    <div class="story-header">${sec.title}</div>
    ${hint}
    <div class="story-text">${applyFurigana(sec.text.replace(/\n/g, '<br>'))}</div>
    <button class="mc-btn" onclick="goToQuiz()">${isRetry ? 'もう一度クイズに挑戦 →' : '問題へすすむ →'}</button>
  `;
  startReadingTimer();
}

function renderQuiz(el) {
  const sec = sections[currentSection];
  const q = sec.questions[currentQuestion];
  const ans = answers[currentSection][currentQuestion];
  const progress = (currentSection + (currentQuestion + 1) / sec.questions.length) / sections.length * 100;
  const qNum = sections.slice(0, currentSection).reduce((s, sec) => s + sec.questions.length, 0) + currentQuestion + 1;

  const choicesHtml = q.choices.map((c, i) => {
    let cls = 'choice-btn';
    let disabled = '';
    if (ans.locked) {
      disabled = 'disabled';
      if (i === q.answer) cls += ' correct';
    } else if (ans.wrongChoices.includes(i)) {
      disabled = 'disabled';
      cls += ' past-wrong';
    }
    return `<button class="${cls}" onclick="selectAnswer(${i})" id="choice${i}" ${disabled}>${['A','B','C','D'][i]}. ${applyFurigana(c)}</button>`;
  }).join('');

  let feedbackHtml = '';
  if (ans.locked) {
    feedbackHtml = `
      <div class="result-box correct">⭕ 正解！<br>${applyFurigana(q.explanation)}</div>
      <button class="mc-btn" onclick="nextStep()" style="margin-top:6px">つぎへ →</button>
    `;
  } else if (ans.wrongChoices.length > 0) {
    feedbackHtml = `
      <div class="result-box wrong">❌ ちがうよ…<br>もう一度お話を読んで、ヒントをさがそう！</div>
      <button class="mc-btn reread-btn" onclick="goBackToReading()" style="margin-top:6px; font-size:15px; padding:12px 18px;">📖 もう一度読む</button>
    `;
  }

  // 未回答・未間違いなら「もう一度読む」も下に表示
  const extraReread = (!ans.locked && ans.wrongChoices.length === 0)
    ? '<button class="mc-btn reread-btn" onclick="goBackToReading()" style="margin-top:14px">📖 もう一度読む</button>'
    : '';

  el.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="score-display">1回で正解: <span class="num">${score}</span> / ${totalQuestions}</div>
    <div class="quiz-header">問${qNum} / ${totalQuestions}（${sec.title}）</div>
    <div class="quiz-question">${applyFurigana(q.q)}</div>
    <div id="choices">${choicesHtml}</div>
    <div id="feedback">${feedbackHtml}</div>
    ${extraReread}
  `;
}

function selectAnswer(idx) {
  const ans = answers[currentSection][currentQuestion];
  if (ans.locked) return;
  if (ans.wrongChoices.includes(idx)) return;

  const sec = sections[currentSection];
  const q = sec.questions[currentQuestion];
  const correct = idx === q.answer;
  const logQ = log.sections[currentSection].questions[currentQuestion];
  logQ.attemptCount++;

  if (correct) {
    ans.locked = true;
    if (logQ.attemptCount === 1) {
      score++;
      logQ.firstTryCorrect = true;
    }
    showSpeech('Yuuki', 'せいかい！', 2000);
  } else {
    ans.wrongChoices.push(idx);
    logQ.wrongChoicesTexts.push(q.choices[idx]);
    showSpeech('Kent', 'ちがうよ！', 2000);
  }

  saveProgress();
  render();
}

function nextStep() {
  const sec = sections[currentSection];
  currentQuestion++;
  if (currentQuestion >= sec.questions.length) {
    currentQuestion = 0;
    currentSection++;
    if (currentSection >= sections.length) {
      phase = 'final';
      log.completedAt = new Date().toISOString();
      saveLogArchive();
      clearProgress();
    } else {
      phase = 'reading';
    }
  } else {
    phase = 'quiz';
  }
  saveProgress();
  render();
  window.scrollTo(0, 0);
}

function goBackToReading() {
  if (log.sections[currentSection]) {
    log.sections[currentSection].rereadCount++;
  }
  phase = 'reading';
  saveProgress();
  render();
  window.scrollTo(0, 0);
}

function goToQuiz() {
  stopReadingTimer();
  phase = 'quiz';
  saveProgress();
  render();
  window.scrollTo(0, 0);
}

function formatTime(sec) {
  if (sec < 60) return sec + '秒';
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return s > 0 ? m + '分' + s + '秒' : m + '分';
}

function renderFinal(el) {
  const pct = Math.round(score / totalQuestions * 100);
  let stars, msg;
  if (pct >= 90) { stars = '⭐⭐⭐'; msg = 'すばらしい！しっかり読めてる！'; }
  else if (pct >= 70) { stars = '⭐⭐'; msg = 'よくできました！'; }
  else if (pct >= 50) { stars = '⭐'; msg = 'もう少しじっくり読んでみよう！'; }
  else { stars = ''; msg = 'もう一度ゆっくり読んでみよう！'; }

  const totalReadingSec = log.sections.reduce((s, sec) => s + sec.readingSeconds, 0);
  const totalRereadCount = log.sections.reduce((s, sec) => s + sec.rereadCount, 0);
  const totalWrongAnswers = log.sections.reduce((s, sec) =>
    s + sec.questions.reduce((ss, q) => ss + q.wrongChoicesTexts.length, 0), 0);

  const sectionDetails = log.sections.map((sec) => {
    const wrongQs = sec.questions.filter(q => q.wrongChoicesTexts.length > 0);
    const wrongHtml = wrongQs.length ? wrongQs.map(q => `
      <div class="log-wrong-item">
        <div class="log-q">Q: ${q.q}</div>
        <div class="log-a">えらんだ答え: ${q.wrongChoicesTexts.map(t => '「' + t + '」').join(' → ')}</div>
      </div>
    `).join('') : '<div class="log-ok-item">✨ 全問1回で正解！</div>';
    return `
      <div class="log-section">
        <div class="log-title">${sec.title}</div>
        <div class="log-row">📖 読書時間: ${formatTime(sec.readingSeconds)}　🔄 読み直し: ${sec.rereadCount}回</div>
        ${wrongHtml}
      </div>
    `;
  }).join('');

  el.innerHTML = `
    <div class="final-score">
      <h2>🏆 けっか発表 🏆</h2>
      <div class="stars">${stars}</div>
      <div class="big-score">${score} <span>/ ${totalQuestions}</span></div>
      <p style="font-size:12px; color:#6b5a3a; margin:2px 0 10px;">1回で正解した数</p>
      <p style="font-size:15px; color:#3b2a14; margin:10px 0;">${msg}</p>
      <p style="font-size:13px; color:#6b5a3a; margin-bottom:12px;">正答率 ${pct}%</p>

      <div class="log-summary-box">
        <h3>📊 読書ログ</h3>
        <div class="log-row">⏱ 読書時間の合計: <b>${formatTime(totalReadingSec)}</b></div>
        <div class="log-row">📖 もう一度読んだ回数: <b>${totalRereadCount}回</b></div>
        <div class="log-row">❌ まちがえた回数: <b>${totalWrongAnswers}回</b></div>
      </div>

      <details class="log-details">
        <summary>パートごとの詳細をみる</summary>
        <div class="log-sections">${sectionDetails}</div>
      </details>

      <button class="mc-btn" onclick="copyLog()" style="margin-top:14px">📋 ログをコピー</button>
      <button class="mc-btn gray" onclick="resetGame()">もう一度あそぶ</button>
    </div>
  `;

  if (pct >= 70) {
    showSpeech('Yuuki', 'やったね！', 3000);
  } else {
    showSpeech('Kent', 'もう一回！', 3000);
  }
}

function copyLog() {
  const lines = [];
  lines.push('✨ バイオームの魔法使い (後編)クイズ ログ');
  lines.push('はじめ: ' + (log.startedAt ? new Date(log.startedAt).toLocaleString('ja-JP') : '-'));
  lines.push('おわり: ' + (log.completedAt ? new Date(log.completedAt).toLocaleString('ja-JP') : '未完'));
  lines.push('1回で正解: ' + score + ' / ' + totalQuestions);
  const totalReadingSec = log.sections.reduce((s, sec) => s + sec.readingSeconds, 0);
  const totalRereadCount = log.sections.reduce((s, sec) => s + sec.rereadCount, 0);
  lines.push('読書時間の合計: ' + formatTime(totalReadingSec));
  lines.push('もう一度読んだ回数: ' + totalRereadCount);
  lines.push('');
  log.sections.forEach(sec => {
    lines.push('■ ' + sec.title);
    lines.push('  読書時間: ' + formatTime(sec.readingSeconds) + ' / 読み直し: ' + sec.rereadCount + '回');
    sec.questions.forEach((q, i) => {
      if (q.wrongChoicesTexts.length > 0) {
        lines.push('  Q' + (i+1) + ': ' + q.q);
        lines.push('    間違えた: ' + q.wrongChoicesTexts.map(t => '「' + t + '」').join(' → '));
      }
    });
    lines.push('');
  });
  const text = lines.join('\n');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => alert('ログをコピーしました！'),
      () => fallbackCopy(text)
    );
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.top = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); alert('ログをコピーしました！'); }
  catch(e) { alert('コピーできませんでした。画面のテキストを長押しでコピーしてね。'); }
  document.body.removeChild(ta);
}

// ===== GAME CONTROL =====
function startGame() {
  currentSection = 0;
  currentQuestion = 0;
  score = 0;
  answers = makeFreshAnswers();
  log = makeFreshLog();
  phase = 'reading';
  saveProgress();
  render();
}

function resumeGame() {
  const d = loadProgress();
  if (!d) { startGame(); return; }
  currentSection = d.section;
  currentQuestion = d.question;
  score = d.score;
  phase = d.phase;
  if (d.answers) answers = d.answers;
  if (d.log) log = d.log;
  render();
  window.scrollTo(0, 0);
}

function resetGame() {
  currentSection = 0;
  currentQuestion = 0;
  score = 0;
  phase = 'title';
  clearProgress();
  render();
  window.scrollTo(0, 0);
}

// ===== ふりがなタップ処理 =====
document.addEventListener('click', function(e) {
  const t = e.target;
  if (t && t.classList && t.classList.contains('kanji-pop')) {
    const wasActive = t.classList.contains('active');
    document.querySelectorAll('.kanji-pop.active').forEach(a => a.classList.remove('active'));
    if (!wasActive) t.classList.add('active');
    e.stopPropagation();
    return;
  }
  // 外側タップで全ポップアップを閉じる
  document.querySelectorAll('.kanji-pop.active').forEach(a => a.classList.remove('active'));
});

// ===== INIT =====
try {
  buildGrass();
  buildCharacters();
  render();
} catch(e) {
  document.getElementById('content').innerHTML =
    '<div style="padding:20px;color:red;font-size:16px;">エラー: ' + e.message + '</div>';
}
window.onerror = function(msg, url, line) {
  var el = document.getElementById('content');
  if (el) el.innerHTML = '<div style="padding:20px;color:red;font-size:16px;">エラー(L' + line + '): ' + msg + '</div>';
};
</script>
